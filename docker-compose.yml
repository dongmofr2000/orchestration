volumes:
  postgres-new-data: # Nouveau nom de volume pour forcer un emplacement propre
    driver: local
  kestra-data:
    driver: local

services:
  postgres:
    image: postgres
    restart: always 
    volumes:
      # MODIFICATION CRITIQUE : Montage du volume vers le dossier parent
      - postgres-new-data:/var/lib/postgresql 
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    healthcheck:
      # Le healthcheck pour savoir si la base de données est PRÊTE
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 3s
      timeout: 5s
      retries: 5

  kestra:
    image: kestra/kestra:latest
    pull_policy: always
    # Ajout d'une politique de redémarrage pour réessayer si l'initialisation échoue
    restart: on-failure
    user: "root"
    command: server standalone
    volumes:
      - kestra-data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4
        kestra:
          server:
            basicAuth:
              enabled: true
              username: "dongmofr2000@yahoo.fr" 
              password: Yaounde0123@
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8584/
    ports:
      - "8584:8080"
      - "8081:8081"
    depends_on:
      postgres:
        # ⭐ Condition CHANGÉE : Kestra attend que postgres soit HEALTHY (sain)
        condition: service_healthy 



