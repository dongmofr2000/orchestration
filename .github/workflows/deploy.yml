name: Pipeline CI/CD Sportif

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v4

    - name: Configurer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # Pas de cache activé ici pour éviter l'erreur de fichier manquant

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        # Si vous avez des bibliothèques spécifiques (comme pandas ou requests), 
        # on les installe directement ici pour le POC :
        pip install pandas

    - name: Exécuter le pipeline sportif
      run: |
        python pipeline_sportif.py